<div class="root-shell">
  <header class="root-header">
    <div class="header-main">
      <a class="brand-lockup" routerLink="/landing" queryParamsHandling="merge" aria-label="Go to home">
        <h1 class="header-title">QueryLens</h1>
      </a>

      <nav class="main-nav">
        <a
          routerLink="/workspace"
          queryParamsHandling="merge"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Workspace
        </a>
        <a routerLink="/settings" queryParamsHandling="merge" routerLinkActive="active">Settings</a>
      </nav>
    </div>

    <div class="header-rail">
      <p class="header-privacy-note">
        <span class="privacy-dot"></span>
        All processing stays in your browser. No data is sent to QueryLens servers.
      </p>

      <button
        class="theme-toggle"
        (click)="theme.toggle()"
        [title]="theme.isDark() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
        [attr.aria-label]="theme.isDark() ? 'Cambiar a tema claro' : 'Cambiar a tema oscuro'"
      >{{ theme.isDark() ? '☀' : '☾' }}</button>

      <div class="experience-switch" role="group" aria-label="Experience mode">
        <button class="switch-btn" [class.active]="appMode.mode() === 'demo'" (click)="setExperience('demo')">
          Play Demo
        </button>
        <button class="switch-btn" [class.active]="appMode.mode() === 'live'" (click)="setExperience('live')">
          Live Mode
        </button>
      </div>
    </div>
  </header>

  <main class="root-content">
    <router-outlet />
  </main>

  <footer class="privacy-footer" role="status" aria-live="polite">
    <p class="privacy-footer-text">
      QueryLens runs locally in your browser. No data is sent to QueryLens servers, and no non-essential cookies are
      used.
      <a routerLink="/privacy" queryParamsHandling="merge">Privacy details</a>
    </p>
  </footer>
</div>
