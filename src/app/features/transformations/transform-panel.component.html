<div class="panel">
  <button class="toggle" (click)="toggle()">
    <span>Transformation Studio</span>
    <span class="chevron">{{ expanded() ? '▲' : '▼' }}</span>
  </button>

  @if (expanded()) {
    <div class="body">
      <div class="row">
        <label class="label">Type</label>
        <select class="select" [value]="type()" (change)="type.set($any($event.target).value)">
          <option value="sort">Sort</option>
          <option value="map">Map</option>
          <option value="groupBy">Group By</option>
        </select>
      </div>

      @switch (type()) {
        @case ('sort') {
          <div class="row">
            <label class="label">Field</label>
            <select class="select" [value]="sortField()" (change)="sortField.set($any($event.target).value)">
              @for (field of fields; track field.key) {
                <option [value]="field.key">{{ field.label }}</option>
              }
            </select>
          </div>

          <div class="row">
            <label class="label">Direction</label>
            <select
              class="select"
              [value]="sortDirection()"
              (change)="sortDirection.set($any($event.target).value)"
            >
              <option value="asc">Ascending</option>
              <option value="desc">Descending</option>
            </select>
          </div>
        }

        @case ('map') {
          <div class="field-list">
            @for (field of fields; track field.key) {
              <label class="field-check">
                <input
                  type="checkbox"
                  [checked]="mapFields().includes(field.key)"
                  (change)="toggleMapField(field.key)"
                />
                {{ field.label }}
              </label>
            }
          </div>
        }

        @case ('groupBy') {
          <div class="row">
            <label class="label">Group by</label>
            <select class="select" [value]="groupField()" (change)="groupField.set($any($event.target).value)">
              @for (field of fields; track field.key) {
                <option [value]="field.key">{{ field.label }}</option>
              }
            </select>
          </div>

          <div class="row">
            <label class="label">Aggregate</label>
            <select
              class="select"
              [value]="groupAggregate()"
              (change)="groupAggregate.set($any($event.target).value)"
            >
              <option value="count">Count</option>
              <option value="sum">Sum</option>
              <option value="avg">Avg</option>
              <option value="min">Min</option>
              <option value="max">Max</option>
            </select>
          </div>

          @if (groupAggregate() !== 'count') {
            <div class="row">
              <label class="label">Value field</label>
              <select
                class="select"
                [value]="groupValueField()"
                (change)="groupValueField.set($any($event.target).value)"
              >
                @for (field of fields; track field.key) {
                  <option [value]="field.key">{{ field.label }}</option>
                }
              </select>
            </div>
          }
        }
      }

      <div class="actions">
        <button class="btn-apply" (click)="apply()" [disabled]="store.results().length === 0">Apply</button>
        <button class="btn-reset" (click)="clearTransformation()" [disabled]="!store.transformation()">
          Clear
        </button>
      </div>
    </div>
  }
</div>
