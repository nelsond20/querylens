<div class="panel">
  <button class="toggle" (click)="toggle()" [attr.aria-expanded]="expanded()">
    <span>Transformation Studio</span>
    <span class="chevron" [class.is-open]="expanded()" aria-hidden="true"></span>
  </button>

  @if (expanded()) {
    <div class="body">
      <div class="row">
        <label class="label">Type</label>
        <ql-select
          [options]="typeOptions"
          [value]="type()"
          (valueChange)="type.set($any($event))"
        />
      </div>

      @switch (type()) {
        @case ('sort') {
          <div class="row">
            <label class="label">Field</label>
            <ql-select
              [options]="fieldOptions"
              [value]="sortField()"
              (valueChange)="sortField.set($any($event))"
            />
          </div>

          <div class="row">
            <label class="label">Direction</label>
            <ql-select
              [options]="directionOptions"
              [value]="sortDirection()"
              (valueChange)="sortDirection.set($any($event))"
            />
          </div>
        }

        @case ('map') {
          <div class="field-list">
            @for (field of fields; track field.key) {
              <label class="field-check">
                <input
                  type="checkbox"
                  [checked]="mapFields().includes(field.key)"
                  (change)="toggleMapField(field.key)"
                />
                {{ field.label }}
              </label>
            }
          </div>
        }

        @case ('groupBy') {
          <div class="row">
            <label class="label">Group by</label>
            <ql-select
              [options]="fieldOptions"
              [value]="groupField()"
              (valueChange)="groupField.set($any($event))"
            />
          </div>

          <div class="row">
            <label class="label">Aggregate</label>
            <ql-select
              [options]="aggregateOptions"
              [value]="groupAggregate()"
              (valueChange)="groupAggregate.set($any($event))"
            />
          </div>

          @if (groupAggregate() !== 'count') {
            <div class="row">
              <label class="label">Value field</label>
              <ql-select
                [options]="fieldOptions"
                [value]="groupValueField()"
                (valueChange)="groupValueField.set($any($event))"
              />
            </div>
          }
        }
      }

      <div class="actions">
        <button class="btn-apply" (click)="apply()" [disabled]="store.results().length === 0">Apply</button>
        <button class="btn-reset" (click)="clearTransformation()" [disabled]="!store.transformation()">
          Clear
        </button>
      </div>
    </div>
  }
</div>
