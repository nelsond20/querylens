<div class="condition">
  <ql-select
    [compact]="true"
    [options]="fieldOptions"
    [value]="condition.field"
    (valueChange)="updateField($any($event))"
  />

  <ql-select
    [compact]="true"
    [options]="operatorOptions"
    [value]="condition.operator"
    (valueChange)="updateOperator($any($event))"
  />

  @if (fieldType === 'boolean') {
    <ql-select
      [compact]="true"
      [options]="booleanOptions"
      [value]="valueAsText"
      (valueChange)="updateValue($any($event))"
    />
  } @else {
    <input
      class="input"
      [type]="fieldType === 'number' ? 'number' : fieldType === 'date' ? 'date' : 'text'"
      [value]="valueAsText"
      (input)="updateValue($any($event.target).value)"
      [placeholder]="inputPlaceholder"
    />
  }

  <button class="btn-remove" (click)="remove.emit()" title="Remove condition" aria-label="Remove condition">×</button>
</div>
