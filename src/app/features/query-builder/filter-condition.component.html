<div class="condition">
  <select class="select" [value]="condition.field" (change)="updateField($any($event.target).value)">
    @for (field of fields; track field.key) {
      <option [value]="field.key">{{ field.label }}</option>
    }
  </select>

  <select class="select" [value]="condition.operator" (change)="updateOperator($any($event.target).value)">
    @for (operator of operators; track operator.value) {
      <option [value]="operator.value">{{ operator.label }}</option>
    }
  </select>

  @if (fieldType === 'boolean') {
    <select class="select" [value]="$any(condition.value)" (change)="updateValue($any($event.target).value)">
      <option value="true">true</option>
      <option value="false">false</option>
    </select>
  } @else {
    <input
      class="input"
      [type]="fieldType === 'number' ? 'number' : fieldType === 'date' ? 'date' : 'text'"
      [value]="$any(condition.value)"
      (input)="updateValue($any($event.target).value)"
      placeholder="value"
    />
  }

  <button class="btn-remove" (click)="remove.emit()" title="Remove condition">x</button>
</div>
