<div class="condition">
  <ql-select
    [compact]="true"
    [options]="fieldOptions"
    [value]="condition.field"
    (valueChange)="updateField($any($event))"
  />

  @if (fieldType === 'boolean') {
    <span class="operator-fixed" aria-label="Equals operator">=</span>
  } @else {
    <ql-select
      [compact]="true"
      [options]="operatorOptions"
      [value]="condition.operator"
      (valueChange)="updateOperator($any($event))"
    />
  }

  @if (fieldType === 'boolean') {
    <select
      class="input boolean-select"
      [value]="valueAsText === 'true' || valueAsText === 'false' ? valueAsText : ''"
      (change)="updateValue($any($event.target).value)"
    >
      <option value="" disabled>Select value</option>
      <option value="true">true</option>
      <option value="false">false</option>
    </select>
  } @else {
    <input
      class="input"
      [type]="fieldType === 'date' ? 'date' : 'text'"
      [attr.inputmode]="fieldType === 'number' ? 'decimal' : null"
      [value]="localValue()"
      (input)="onInputChange($any($event.target).value)"
      (change)="updateValue($any($event.target).value)"
      [placeholder]="inputPlaceholder"
    />
  }

  <button class="btn-remove" (click)="remove.emit()" title="Remove condition" aria-label="Remove condition">×</button>
</div>
