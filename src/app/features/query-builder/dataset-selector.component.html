<div class="selector">
  <label class="label">Dataset Scope</label>

  @if (datasets.length === 0) {
    <select class="select" disabled>
      <option>No datasets available</option>
    </select>
    @if (mode === 'live') {
      <span class="hint">Import a dataset from Live Data Sources to begin.</span>
    }
  } @else {
    <select class="select" [value]="store.selectedDatasetId()" (change)="select($any($event.target).value)">
      @for (dataset of datasets; track dataset.id) {
        <option [value]="dataset.id">
          {{ dataset.name }}{{ dataset.source !== 'built-in' ? ' · imported' : '' }}
        </option>
      }
    </select>
  }
</div>
